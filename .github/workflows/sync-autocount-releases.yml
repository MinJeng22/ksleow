name: Sync AutoCount release notes

on:
  schedule:
    # 8:00 AM Malaysia time (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch official AutoCount release notes
        run: npm run sync:autocount-releases

      - name: Fetch official AutoCount Cloud release notes
        run: npm run sync:autocount-cloud-releases

      - name: Build check
        run: npm run build:fast

      - name: Commit and push if updated
        id: commit_push
        run: |
          if git diff --quiet -- src/content/autocountReleases.json src/content/autocountCloudReleases.json; then
            echo "AutoCount release notes are already up to date."
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/autocountReleases.json src/content/autocountCloudReleases.json
          git commit -m "chore: sync AutoCount release notes"
          git push
          echo "updated=true" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: steps.commit_push.outputs.updated == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "AutoCount Release Notes Updated!"
          to: "your-email@example.com"
          from: "GitHub Actions"
          body: "AutoCount release notes have been successfully synced and updated on the KSL website repository."
